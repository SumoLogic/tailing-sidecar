version: 2
updates:
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "daily"
      time: "06:27"
      timezone: "Europe/Warsaw"

  - package-ecosystem: "docker"
    directory: "/operator"
    schedule:
      interval: "daily"
      time: "06:27"
      timezone: "Europe/Warsaw"

  - package-ecosystem: "gomod"
    directory: "/operator"
    schedule:
      interval: "daily"
      time: "06:27"
      timezone: "Europe/Warsaw"
    groups:
      kubernetes:
        patterns:
          - "k8s.io/*"
          - "sigs.k8s.io/*"
